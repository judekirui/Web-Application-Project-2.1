<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

    <div id="navbar"></div>

    <!-- PAGE BANNER -->
    <section class="page-banner">
      <div class="container">
        <h1 class="fw-bold">Contact Us</h1>
        <p class="lead mb-0">---------------------------</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="row g-5">
          <!-- Contact info -->
          <div class="col-lg-5" align ="center" >
            <div class="section-gray p-4 rounded h-100" width="100%"> 
              <h5 class="fw-bold">Contact Us?</h5>
              <p class="text-muted-custom mb-4">-------------------</p>
              <ul class="list-unstyled">
                <li class="mb-3"><strong>Address</strong><br><span class="text-muted-custom">---------------</span></li>
                <li class="mb-3"><strong>Phone</strong><br><span class="text-muted-custom">----------------</span></li>
                <li class="mb-3"><strong>Email</strong><br><span class="text-muted-custom">------------</span></li>
                <li class="mb-0"><strong>Business Hours</strong><br><span class="text-muted-custom">-----------------</span></li>
              </ul>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="nav.js"></script>

</body>
</html>

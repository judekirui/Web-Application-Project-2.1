<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact page</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

  <div id="navbar"></div>

  <!-- PAGE BANNER -->
  <section class="page-banner">
    <div class="container">
      <h1 class="fw-bold">Contact Us</h1>
      <p class="lead mb-0">---------------------------</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="row g-5">


        <!-- Contact info -->
        <div class="col-12 col-lg-5" align="center">
          <div class="section-gray p-4 rounded h-100" width="100%">
            <h5 class="fw-bold">Contact Us?</h5>
            <p class="text-muted-custom mb-4">-------------------</p>
            <ul class="list-unstyled">
              <li class="mb-3"><strong>Address</strong><br><span class="text-muted-custom">---------------</span></li>
              <li class="mb-3"><strong>Phone</strong><br><span class="text-muted-custom">----------------</span></li>
              <li class="mb-3"><strong>Email</strong><br><span class="text-muted-custom">------------</span></li>
              <li class="mb-0"><strong>Business Hours</strong><br><span
                  class="text-muted-custom">-----------------</span></li>
            </ul>
          </div>
        </div>

        <!-- Contact form -->
        <div class="col-lg-7">
          <h2 class="fw-bold mb-4">Request a Quote</h2>
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" required>
              </div>
              <div class="col-md-6">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" required>
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="col-md-6">
                <label for="equipment" class="form-label">Equipment Needed</label>
                <select class="form-select" id="equipment">
                  <option selected>Select an option</option>
                  <option>Crane Rental</option>
                  <option>Excavator</option>
                  <option>Heavy Hauling</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="col-12">
                <label for="message" class="form-label">Project Details</label>
                <textarea class="form-control" id="message" rows="5"
                  placeholder="Tell us about your project, timeline, and location"></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn-brand btn-lg">Send Request</button>
              </div>
            </div>
          </form>
        </div>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="nav.js"></script>

</body>

</html>
